<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用量配置管理 - Muses</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/common.css">
  <style>
    .usage-page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .usage-filters{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .usage-filters-left{display:flex;align-items:center;gap:8px}
    .usage-filter-input{height:36px;width:220px;padding:0 12px;border:1px solid var(--border-color-input);border-radius:var(--radius-8);font-size:14px;color:var(--t1);outline:none;background:#fff;transition:all 0.15s}
    .usage-filter-input:hover{border-color:var(--primary);background:#F7F8F9}
    .usage-filter-input:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(28,100,242,0.08)}
    .usage-content-cell{font-family:var(--font-mono);font-size:12px;color:var(--t2);white-space:pre-wrap;word-break:break-word;max-height:88px;overflow:auto}
    .drawer-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:1000;opacity:0;transition:opacity 0.25s;pointer-events:none}
    .drawer-overlay.open{opacity:1;pointer-events:auto}
    .drawer{position:fixed;top:0;right:-640px;width:640px;max-width:90vw;height:100vh;background:#fff;box-shadow:var(--shadow-lg);z-index:1001;display:flex;flex-direction:column;transition:right 0.3s ease}
    .drawer.open{right:0}
    .drawer-header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border-color-strong)}
    .drawer-header h3{font-size:16px;font-weight:600;color:var(--t1)}
    .drawer-close{width:28px;height:28px;border:none;background:none;cursor:pointer;font-size:18px;color:var(--t3);border-radius:var(--radius-4);display:flex;align-items:center;justify-content:center;transition:all 0.15s}
    .drawer-close:hover{background:var(--bg-surface);color:var(--t2)}
    .drawer-body{padding:24px;flex:1;overflow-y:auto;min-height:0}
    .drawer-footer{flex-shrink:0;padding:16px 24px;display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--border-color)}
    .form-textarea{width:100%;height:auto;min-height:180px;padding:8px 12px;border:1px solid var(--border-color-input);border-radius:var(--radius-8);font-size:13px;font-family:var(--font-mono);color:var(--t1);outline:none;resize:vertical;line-height:1.6;background:#fff}
    .form-textarea:hover{border-color:var(--primary);background:#F7F8F9}
    .form-textarea:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(28,100,242,0.08)}
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sb" id="sidebar"></aside>
    <main class="main-content" id="main-content">
      <div class="usage-page-header">
        <h1 class="page-title" style="margin-bottom:0">用量配置管理</h1>
      </div>
      <div class="usage-filters">
        <div class="usage-filters-left">
          <input type="text" class="usage-filter-input" id="filterUsageConfigName" placeholder="搜索配置名称/内容" oninput="applyUsageConfigFilters()" />
        </div>
        <button class="btn bp" onclick="openUsageConfigDrawer()">添加用量配置</button>
      </div>
      <div class="card" style="padding:0">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th style="width:220px">配置名称</th>
                <th>内容</th>
                <th style="width:160px">创建时间</th>
                <th style="width:160px">操作</th>
              </tr>
            </thead>
            <tbody id="usageConfigTableBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <script src="js/common.js"></script>
  <script src="js/usage-config.js"></script>
</body>
</html>
