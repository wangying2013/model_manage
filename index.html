<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模型广场 - Muses</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/models.css?v=20260605-2">
</head>
<body>
  <div class="app-layout">
    <aside class="sb" id="sidebar"></aside>
    <main class="main-content">
      <h1 class="page-title">模型广场</h1>
      <div class="marketplace-layout">
        <aside class="filter-panel" id="filterPanel">
          <!-- 由 JS 动态渲染 -->
        </aside>
        <section class="model-list">
          <div class="model-toolbar" id="modelToolbar">
            <span class="model-count" id="modelCount">共 0 个模型</span>
            <input type="text" class="fi" id="searchInput" placeholder="搜索模型名称..." />
            <div class="select-wrap">
              <select id="sortFilter" class="fs-auto">
                <option value="newest" selected>最新上线</option>
                <option value="release">最新发布</option>
                <option value="price">最低价格</option>
              </select>
            </div>
            <button class="btn bc" id="compareBtn">模型对比</button>
          </div>
          <div class="model-cards" id="modelGrid"></div>
        </section>
      </div>
    </main>
  </div>

  <script src="js/data.js"></script>
  <script src="js/common.js"></script>
  <script src="js/models.js?v=20260605-2"></script>
</body>
</html>
