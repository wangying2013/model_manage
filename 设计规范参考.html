<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>模型精调 - Muses 平台</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sb">
    <div class="sb-logo"><div class="ico">M</div><span>Muses</span></div>
    <div class="sb-ws">
      <div class="ws-btn" onclick="toggleWsDropdown()">
        <span class="ws-av">默</span>
        <span class="ws-name" id="ws-name">默认空间</span>

        <svg class="ws-arrow" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M4 5.5l3 3 3-3" stroke="rgb(135,143,155)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>
    <div class="sb-nav">
    <div class="sb-sec"><div class="sb-sec-t">应用开发</div>
      <div class="sb-i" title="应用"><span class="ic">📱</span><span>应用</span></div>
      <div class="sb-i" title="提示词库"><span class="ic">💬</span><span>提示词库</span></div>
      <div class="sb-i" title="知识库"><span class="ic">📚</span><span>知识库</span></div>
      <div class="sb-i" title="工具"><span class="ic">🔧</span><span>工具</span></div>
      <div class="sb-i" title="效果评测"><span class="ic">🏆</span><span>效果评测</span></div>
    </div>
    <div class="sb-sec"><div class="sb-sec-t">模型服务</div>
      <div class="sb-i" title="模型广场"><span class="ic">🏪</span><span>模型广场</span></div>
      <div class="sb-i" title="批量推理"><span class="ic">⚡</span><span>批量推理</span></div>
      <div class="sb-i" title="模型部署"><span class="ic">🚀</span><span>模型部署</span></div>
      <div class="sb-i" title="模型管理"><span class="ic">📦</span><span>模型管理</span></div>
      <div class="sb-i on" title="模型精调"><span class="ic">🎯</span><span>模型精调</span></div>
    </div>
    <div class="sb-sec"><div class="sb-sec-t">数据管理</div>
      <div class="sb-i" title="数据集"><span class="ic">📊</span><span>数据集</span></div>
      <div class="sb-i" title="数据处理"><span class="ic">🧹</span><span>数据处理</span></div>
    </div>
    <div class="sb-sec"><div class="sb-sec-t">管理中心</div>
      <div class="sb-i" title="API Key 管理"><span class="ic">🔑</span><span>API Key 管理</span></div>
      <div class="sb-i" title="资源管理"><span class="ic">⚙️</span><span>资源管理</span></div>
      <div class="sb-i" title="空间配置"><span class="ic">⚙️</span><span>空间配置</span></div>
      <div class="sb-i" title="操作记录"><span class="ic">📋</span><span>操作记录</span></div>
    </div>
    </div>
    <div class="sb-user">
      <div class="sb-user-btn">
        <div class="sb-user-av">王</div>
        <div class="sb-user-info"><span class="sb-user-nm">王颖</span></div>
      </div>
      <div class="sb-user-actions">
        <span class="sb-user-icon">⚙️</span>
        <span class="sb-user-icon">🚪</span>
      </div>
    </div>
  </aside>
  <div class="ws-dropdown" id="ws-dropdown">
    <div class="ws-search">
      <svg class="ws-search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="#999" stroke-width="1.3"/><path d="M9.5 9.5L13 13" stroke="#999" stroke-width="1.3" stroke-linecap="round"/></svg>
      <input class="ws-search-input" id="ws-search-input" placeholder="搜索空间名称" oninput="filterWsList(this.value)">
    </div>
    <div class="ws-list" id="ws-list"></div>
    <div class="ws-create" onclick="event.stopPropagation();createWs()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="var(--primary)" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span>创建空间</span>
    </div>
  </div>

  <!-- Main -->
  <div class="mn">
    <!-- LIST -->
    <div class="pg on" id="pg-list">
      <div class="pb">
          <div class="h-full">
          <div style="padding:0 0 16px 0">
            <h1 style="font-size:20px;line-height:28px;font-weight:500;color:var(--t1)">模型精调</h1>
          </div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;justify-content:space-between">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <select class="fs fs-auto" id="f-st"><option value="">全部状态</option><option value="running">运行中</option><option value="completed">完成</option><option value="failed">失败</option><option value="terminated">终止中</option><option value="pending">排队中</option></select>
              <select class="fs fs-auto" id="f-me"><option value="">训练类型</option><option value="SFT">SFT</option><option value="DPO">DPO</option></select>
              <select class="fs fs-auto" id="f-mo"><option value="">基础模型</option><option>Qwen3-8B</option><option>Qwen3-14B</option><option>DeepSeek-R1-7B</option><option>DeepSeek-R1-32B</option><option>Doubao-Pro-32K</option><option>Doubao-Lite-4K</option></select>
              <input class="fi" style="width:200px" placeholder="搜索任务名称 / ID" id="f-se"/>
            </div>
            <button class="btn bp" onclick="goCreate()"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M11 11V5H13V11H19V13H13V19H11V13H5V11H11Z"></path></svg><span>创建精调任务</span></button>
          </div>
          <div class="cd" style="flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;border-radius:8px">
            <div class="tw" style="flex:1"><table><thead><tr><th style="width:120px">任务 ID</th><th style="width:340px">任务名称</th><th style="width:180px">基础模型</th><th>训练类型</th><th>训练方法</th><th style="min-width:90px">状态</th><th style="width:140px">进度</th><th style="width:120px">创建人</th><th style="width:190px">创建时间</th><th style="min-width:150px">操作</th></tr></thead><tbody id="tlb"></tbody></table></div>
          </div>
          <div class="pgn" id="pgn"></div>
        </div>
      </div>
    </div>

    <!-- CREATE -->
    <div class="pg" id="pg-create">
      <div class="create-header">
        <button class="btn bt" onclick="goList()" style="font-size:18px;padding:4px 8px">←</button>
        <h2 style="font-size:18px;font-weight:600">创建精调任务</h2>
      </div>
      <div class="create-main">
        <div class="create-body" id="c-body"></div>
      </div>
      <div class="create-footer">
        <div id="fee-area" style="display:flex;align-items:center;gap:8px">
          <span style="font-size:13px;color:var(--t3)">预估消耗 Token 量：</span>
          <span id="fee-token" style="font-size:18px;font-weight:700;color:var(--primary)">-</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <button class="btn bc" onclick="goList()">取消</button>
          <button class="btn bp" onclick="submitTask()">提交任务</button>
        </div>
      </div>
    </div>

    <!-- DETAIL -->
    <div class="pg" id="pg-detail">
      <!-- Top action bar -->
      <div class="d-bar" id="d-bar">
        <div class="d-bar-l">
          <button class="back-btn" onclick="goList()">←</button>
          <span class="d-title">精调任务详情</span>
        </div>
        <div class="d-bar-r" id="d-bar-btns"></div>
      </div>
      <div id="d-header"></div>
      <div class="dtabs" id="d-tabs">
        <button class="dtab on" onclick="swTab('overview')">任务概览</button>
        <button class="dtab" onclick="swTab('monitor')">训练监控</button>
        <button class="dtab" onclick="swTab('logs')">训练日志</button>
        <button class="dtab" onclick="swTab('output')">模型产出</button>
      </div>
      <div class="dpn" id="d-panels"></div>
    </div>
  </div>
</div>

<!-- Canvas for charts -->
<div style="position:absolute;left:-9999px"><canvas id="offscreen"></canvas></div>

<!-- Modal -->
<div class="mo" id="mo" onclick="event.target===this&&hideM()">
  <div class="md" onclick="event.stopPropagation()">
    <div class="md-h"><h3 id="m-tit"></h3><button class="md-c" onclick="hideM()">×</button></div>
    <div class="md-b" id="m-body"></div>
    <div class="md-f" id="m-ft"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
